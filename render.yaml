databases:
  - name: baseballai-db
    databaseName: baseballai
    user: baseballai
    plan: free

services:
  - type: web
    name: baseballai-api
    runtime: python
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: baseballai-db
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://baseballai-coach.vercel.app","http://localhost:3000"]'
      - key: STORAGE_PROVIDER
        value: r2
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: "BaseballAI Coach <onboarding@resend.dev>"
      - key: APP_BASE_URL
        value: "https://baseballai-coach.vercel.app"
