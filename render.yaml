databases:
  - name: baseballai-db
    databaseName: baseballai
    user: baseballai
    plan: free

services:
  - type: web
    name: baseballai-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: baseballai-db
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://baseballai-coach.vercel.app","http://localhost:3000"]'
      - key: STORAGE_PROVIDER
        value: local
